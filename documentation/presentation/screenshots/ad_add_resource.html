<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Add Resource from Active Directory – Project Offline</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI",Arial,sans-serif;font-size:12px;background:#fff;overflow:hidden;user-select:none}
.window{display:flex;flex-direction:column;width:520px;height:420px;border:1px solid #888;border-radius:4px;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,.28)}

/* ── Dialog header ─────────────────────────── */
.dlg-header{background:#2B579A;color:#fff;padding:14px 18px 12px;flex-shrink:0}
.dlg-header h2{font-size:15px;font-weight:700;margin:0 0 2px}
.dlg-header p{font-size:11px;color:#b8d0f0;margin:0}

/* ── Dialog body ───────────────────────────── */
.dlg-body{flex:1;display:flex;flex-direction:column;padding:16px 18px 12px;background:#fff;gap:9px;overflow:hidden}

/* ── Form rows ─────────────────────────────── */
.form-row{display:flex;align-items:center;gap:8px}
.form-label{width:120px;font-size:11.5px;color:#444;flex-shrink:0;text-align:right}
.form-input{flex:1;border:1px solid #b0c4dc;border-radius:3px;padding:4px 7px;font-size:12px;color:#222;background:#fff}
.form-input::placeholder{color:#aaa}

/* ── Search button row ─────────────────────── */
.search-row{display:flex;justify-content:flex-end;margin-top:2px}
.btn-search{background:#2B579A;color:#fff;border:none;border-radius:3px;padding:5px 18px;font-size:12px;cursor:default;font-weight:600}

/* ── Status label ──────────────────────────── */
.status-lbl{font-size:11px;color:#107C10;font-weight:600;display:flex;align-items:center;gap:5px;min-height:16px}
.status-lbl::before{content:"✔";font-size:12px}

/* ── Result card ───────────────────────────── */
.result-card{background:#F5F8FF;border:1px solid #B8CBE4;border-radius:4px;padding:10px 12px;display:flex;align-items:center;gap:12px}
.avatar{width:44px;height:44px;border-radius:22px;background:#2B579A;color:#fff;font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.user-info{display:flex;flex-direction:column;gap:2px}
.user-name{font-weight:700;font-size:13px;color:#1F1F1F}
.user-email{font-size:11px;color:#555}
.user-dept{font-size:11px;color:#888}

/* ── Footer ────────────────────────────────── */
.dlg-footer{background:#f0f4fb;border-top:1px solid #d0dce8;padding:10px 18px;display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.btn-primary{background:#2B579A;color:#fff;border:none;border-radius:3px;padding:6px 18px;font-size:12px;cursor:default;font-weight:600}
.btn-default{background:#fff;color:#333;border:1px solid #b0c4dc;border-radius:3px;padding:5px 16px;font-size:12px;cursor:default}
</style>
</head>
<body>

<div class="window">

  <!-- Dialog header -->
  <div class="dlg-header">
    <h2>Add Resource from Active Directory</h2>
    <p>Search by username, display name, or e-mail address</p>
  </div>

  <!-- Dialog body -->
  <div class="dlg-body">

    <div class="form-row">
      <span class="form-label">Username (SAM):</span>
      <input class="form-input" type="text" placeholder="e.g. john.doe" value="m.mueller">
    </div>
    <div class="form-row">
      <span class="form-label">Display Name:</span>
      <input class="form-input" type="text" placeholder="e.g. Doe, John  or  John Doe" value="">
    </div>
    <div class="form-row">
      <span class="form-label">E-Mail:</span>
      <input class="form-input" type="text" placeholder="e.g. john.doe@company.com" value="">
    </div>

    <div class="search-row">
      <button class="btn-search">Search</button>
    </div>

    <div class="status-lbl">Selected: Müller, Max</div>

    <!-- Result card — user found -->
    <div class="result-card">
      <div class="avatar">MM</div>
      <div class="user-info">
        <div class="user-name">Müller, Max</div>
        <div class="user-email">max.mueller@company.com</div>
        <div class="user-dept">Engineering / Embedded Systems</div>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="dlg-footer">
    <button class="btn-primary">Add Resource</button>
    <button class="btn-default">Cancel</button>
  </div>

</div>

</body>
</html>
