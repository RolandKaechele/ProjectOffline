<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Timeline Strip Layout – Project Offline</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI",Arial,sans-serif;font-size:12px;background:#F0F0F0;overflow:hidden;user-select:none;width:820px;height:220px}
svg{display:block}
</style>
</head>
<body>
<svg viewBox="0 0 820 220" width="820" height="220" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI,Arial,sans-serif" font-size="12">
  <!-- Window chrome -->
  <rect width="820" height="220" fill="#F0F0F0"/>
  <!-- Blue title bar -->
  <rect width="820" height="28" fill="#2B579A"/>
  <text x="12" y="19" fill="white" font-size="12" font-weight="bold">Project Offline – Q2_Plan.mpp</text>
  <!-- Menu bar -->
  <rect y="28" width="820" height="20" fill="#E8EFF8"/>
  <text x="10" y="42" fill="#1F1F1F" font-size="10">File</text>
  <text x="38" y="42" fill="#1F1F1F" font-size="10">Options</text>
  <text x="82" y="42" fill="#1F1F1F" font-size="10">Project</text>
  <!-- Options menu open -->
  <rect x="34" y="48" width="180" height="42" fill="white" stroke="#ccc" stroke-width="1" rx="2"/>
  <rect x="34" y="48" width="180" height="21" fill="#ECF3FB"/>
  <text x="44" y="62" fill="#1A3F7A" font-size="10" font-weight="bold">☑ Show Timeline Strip</text>
  <text x="44" y="81" fill="#555" font-size="10">Show Sundays</text>
  <!-- Ribbon -->
  <rect y="48" width="820" height="24" fill="#2B579A"/>
  <text x="14" y="64" fill="white" font-size="10" font-weight="bold">TASK</text>
  <text x="60" y="64" fill="#CCE0FF" font-size="10">RESOURCE</text>
  <text x="118" y="64" fill="#CCE0FF" font-size="10">REPORT</text>
  <!-- Timeline strip -->
  <rect y="72" width="820" height="42" fill="#ECF3FB" stroke="#B0C8E0"/>
  <!-- Month header -->
  <text x="70" y="83" fill="#1A3F7A" font-size="9" font-weight="bold">May 2026</text>
  <text x="270" y="83" fill="#1A3F7A" font-size="9" font-weight="bold">Jun 2026</text>
  <text x="470" y="83" fill="#1A3F7A" font-size="9" font-weight="bold">Jul 2026</text>
  <text x="650" y="83" fill="#1A3F7A" font-size="9" font-weight="bold">Aug 2026</text>
  <!-- Month separator lines -->
  <line x1="220" y1="72" x2="220" y2="114" stroke="#C0D4E8" stroke-width="1"/>
  <line x1="430" y1="72" x2="430" y2="114" stroke="#C0D4E8" stroke-width="1"/>
  <line x1="625" y1="72" x2="625" y2="114" stroke="#C0D4E8" stroke-width="1"/>
  <!-- Project span bar (light blue bg) -->
  <rect x="4" y="87" width="812" height="8" rx="2" fill="#BDD7EE" opacity=".6"/>
  <!-- Task bars -->
  <rect x="10" y="97" width="200" height="14" rx="2" fill="#2B579A"/>
  <text x="14" y="108" fill="white" font-size="9">Phase 1: Requirements</text>
  <rect x="225" y="97" width="180" height="14" rx="2" fill="#C55A11"/>
  <text x="229" y="108" fill="white" font-size="9">Phase 2: Design</text>
  <rect x="435" y="97" width="160" height="14" rx="2" fill="#375623"/>
  <text x="439" y="108" fill="white" font-size="9">Phase 3: Build</text>
  <!-- Milestone diamond -->
  <polygon points="630,104  638,97  646,104  638,111" fill="#7030A0"/>
  <text x="650" y="109" fill="#7030A0" font-size="8">Go-live</text>
  <!-- Strip label callout -->
  <text x="340" y="130" fill="#2B579A" font-size="10" font-weight="bold">↑ Timeline strip (above tabs)</text>
  <!-- Tab bar -->
  <rect y="114" width="820" height="22" fill="#DDEAFC" stroke="#B8CBE4"/>
  <rect x="0" y="114" width="80" height="22" fill="#2B579A"/>
  <text x="40" y="129" fill="white" font-size="10" text-anchor="middle">Gantt Chart</text>
  <text x="130" y="129" fill="#2B579A" font-size="10" text-anchor="middle">Task Sheet</text>
  <text x="210" y="129" fill="#2B579A" font-size="10" text-anchor="middle">Team Planner</text>
  <!-- Gantt content (abbreviated) -->
  <rect y="136" width="820" height="84" fill="#FAFCFF"/>
  <rect y="136" width="180" height="84" fill="#F4F8FF" stroke="#E0E8F0"/>
  <text x="10" y="152" fill="#1F1F1F" font-size="10">1  Phase 1: Requirements</text>
  <text x="10" y="170" fill="#1F1F1F" font-size="10">2  Phase 2: Design</text>
  <text x="10" y="188" fill="#1F1F1F" font-size="10">3  Phase 3: Build</text>
  <text x="10" y="206" fill="#7030A0" font-size="10">4  ◆ Go-live</text>
  <!-- Gantt bars (abbreviated) -->
  <rect x="184" y="143" width="200" height="14" fill="#2B579A" rx="2"/>
  <rect x="388" y="161" width="180" height="14" fill="#C55A11" rx="2"/>
  <rect x="590" y="179" width="160" height="14" fill="#375623" rx="2"/>
  <polygon points="768,197  776,190  784,197  776,204" fill="#7030A0"/>
</svg>
</body>
</html>
