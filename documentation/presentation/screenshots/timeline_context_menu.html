<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Timeline Context Menu – Project Offline</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI",Arial,sans-serif;font-size:12px;background:#FAFCFF;overflow:hidden;user-select:none;width:560px;height:200px}
svg{display:block}
</style>
</head>
<body>
<svg viewBox="0 0 560 200" width="560" height="200" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI,Arial,sans-serif" font-size="12">
  <rect width="560" height="200" fill="#FAFCFF"/>
  <!-- Gantt header -->
  <rect width="560" height="22" fill="#ECF3FB" stroke="#B0C8E0"/>
  <text x="280" y="15" fill="#1A3F7A" font-size="10" font-weight="bold" text-anchor="middle">May 2026</text>
  <!-- Task rows -->
  <rect y="22" width="200" height="30" fill="#EEF4FF" stroke="#D8E4F4"/>
  <text x="10" y="42" fill="#1F1F1F" font-size="11">1  Requirements</text>
  <rect y="52" width="200" height="30" fill="#F8FAFF" stroke="#D8E4F4"/>
  <text x="10" y="72" fill="#1F1F1F" font-size="11">2  Design</text>
  <rect y="82" width="200" height="30" fill="#EEF4FF" stroke="#D8E4F4"/>
  <text x="10" y="102" fill="#1F1F1F" font-size="11">3  Go-live ◆</text>
  <!-- Gantt bars -->
  <rect x="200" y="22" width="360" height="30" fill="#EEF4FF" stroke="#D8E4F4"/>
  <rect x="204" y="28" width="120" height="18" rx="2" fill="#2B579A"/>
  <rect x="200" y="52" width="360" height="30" fill="#F8FAFF" stroke="#D8E4F4"/>
  <rect x="328" y="58" width="100" height="18" rx="2" fill="#C55A11"/>
  <!-- Context menu on row 2 -->
  <rect x="80" y="58" width="170" height="54" fill="white" stroke="#B8CBE4" stroke-width="1" rx="3"/>
  <rect x="80" y="58" width="170" height="18" fill="#ECF3FB" rx="3"/>
  <text x="90" y="71" fill="#1A3F7A" font-size="10" font-weight="bold">Task context menu</text>
  <line x1="80" y1="76" x2="250" y2="76" stroke="#D0DDF0"/>
  <rect x="80" y="76" width="170" height="18" fill="#BDD7EE"/>
  <text x="90" y="89" fill="#1A3F7A" font-size="10" font-weight="bold">Add to Timeline</text>
  <text x="90" y="105" fill="#555" font-size="10">Show in Gantt Chart</text>
  <!-- Arrow from context menu to timeline -->
  <text x="260" y="88" fill="#2B579A" font-size="10">→ adds bar to strip above</text>
  <!-- Right-click on strip bar -->
  <rect y="130" width="560" height="44" fill="#ECF3FB" stroke="#B0C8E0"/>
  <text x="10" y="144" fill="#888" font-size="9">Timeline strip</text>
  <rect x="10" y="147" width="100" height="14" rx="2" fill="#2B579A"/>
  <text x="14" y="158" fill="white" font-size="8">Design</text>
  <!-- Right-click popup on strip bar -->
  <rect x="115" y="138" width="155" height="32" fill="white" stroke="#B8CBE4" stroke-width="1" rx="3"/>
  <rect x="115" y="138" width="155" height="16" fill="#FFE8E0" rx="3"/>
  <text x="125" y="150" fill="#C0392B" font-size="10" font-weight="bold">Remove from Timeline</text>
  <text x="125" y="163" fill="#555" font-size="9">right-click on bar or diamond</text>
  <text x="10" y="188" fill="#2B579A" font-size="10">Both source-view and strip context menus can add / remove pinned items.</text>
</svg>
</body>
</html>
