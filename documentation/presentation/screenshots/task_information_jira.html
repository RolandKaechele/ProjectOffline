<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Task Information – Jira Tab</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI",Arial,sans-serif;font-size:12px;background:#2b3a50;overflow:hidden;user-select:none;display:flex;align-items:center;justify-content:center;height:100vh}

.app-bg{position:fixed;inset:0;background:rgba(30,40,60,.55);display:flex;align-items:center;justify-content:center;z-index:10}

.dlg{background:#fff;border-radius:5px;box-shadow:0 12px 40px rgba(0,0,0,.5);width:560px;display:flex;flex-direction:column;overflow:hidden;border:1px solid #7090b0}

.dlg-title{background:linear-gradient(to bottom,#3C71C0,#2B579A);color:#fff;padding:6px 12px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.dlg-close{color:#fff;font-size:16px;cursor:default;opacity:.8;background:none;border:none;font-family:inherit;padding:0 2px}

.dlg-tabs{display:flex;background:#E4EDF8;border-bottom:2px solid #2B579A;padding-top:3px}
.dt{padding:5px 14px;font-size:12px;font-weight:700;color:#2B579A;border:1px solid #BDD0E8;border-bottom:none;background:#E4EDF8;cursor:default;margin-right:1px}
.dt.active{background:#fff;color:#1A3F7A;border-top:2px solid #2B579A}

.dlg-body{padding:18px 20px 14px;background:#fff}

.form-row{display:flex;align-items:center;margin-bottom:12px;gap:10px}
.form-row label{width:130px;flex-shrink:0;font-size:12px;font-weight:600;color:#2B3A6A;text-align:right}
.form-row .ctrl{flex:1}
input[type=text]{width:100%;padding:4px 7px;border:1px solid #a0b8d0;border-radius:3px;font-size:12px;font-family:"Segoe UI",Arial,sans-serif;background:#f0f4f8;color:#1a1a2e;outline:none}

.link-row{display:flex;align-items:center;gap:8px}
.link-url{flex:1;padding:4px 7px;border:1px solid #a0b8d0;border-radius:3px;font-size:12px;background:#f0f4f8;color:#2B579A;text-decoration:underline;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.btn-browse{padding:4px 12px;border:1px solid #a0b8d0;border-radius:3px;font-size:12px;background:#e8f0fb;color:#1a3f7a;font-weight:600;cursor:default}

.status-badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:700;background:#E3F2E1;color:#276221;border:1px solid #b2ddb0}
.status-badge.inprogress{background:#FFF3CD;color:#7a5700;border-color:#f5d97a}

.sep-line{border:none;border-top:1px solid #D0DDF0;margin:10px 0}

.no-data{color:#888;font-size:12px;font-style:italic;padding:20px 0;text-align:center}

.info-box{background:#f0f5ff;border:1px solid #c0d4f0;border-radius:4px;padding:8px 12px;font-size:11px;color:#3a5080;margin-top:4px}
.info-box strong{color:#2B579A}

.dlg-footer{background:#f0f4f8;border-top:1px solid #D0DDF0;padding:8px 16px;display:flex;justify-content:flex-end;gap:8px}
.btn{padding:5px 20px;border-radius:3px;font-size:12px;font-family:"Segoe UI",Arial,sans-serif;font-weight:700;cursor:default;border:1px solid}
.btn-ok{background:#2B579A;color:#fff;border-color:#1A3F7A}
.btn-cancel{background:#fff;color:#2B579A;border-color:#a0b8d0}
</style>
</head>
<body>
<div class="app-bg">
  <div class="dlg">
    <div class="dlg-title">
      Task Information
      <button class="dlg-close">✕</button>
    </div>
    <div class="dlg-tabs">
      <div class="dt">General</div>
      <div class="dt">Predecessors</div>
      <div class="dt">Resources</div>
      <div class="dt">Notes</div>
      <div class="dt">Custom Fields</div>
      <div class="dt active">Jira</div>
    </div>
    <div class="dlg-body">

      <div class="form-row">
        <label>Jira Key:</label>
        <div class="ctrl"><input type="text" value="ZOISIT-142" readonly/></div>
      </div>

      <div class="form-row">
        <label>Status:</label>
        <div class="ctrl" style="display:flex;align-items:center;gap:10px">
          <input type="text" value="In Progress" style="width:160px" readonly/>
          <span class="status-badge inprogress">In Progress</span>
        </div>
      </div>

      <hr class="sep-line"/>

      <div class="form-row">
        <label>Browse:</label>
        <div class="ctrl">
          <div class="link-row">
            <div class="link-url">https://company.atlassian.net/browse/ZOISIT-142</div>
            <button class="btn-browse">Open ↗</button>
          </div>
        </div>
      </div>

      <hr class="sep-line"/>

      <div class="info-box">
        <strong>Read-only view.</strong> Jira data was last imported on the most recent
        <em>Run Jira Sync</em> operation. To update, run the sync again via
        <strong>Project → Jira → Run Jira Sync</strong>.
      </div>

    </div>
    <div class="dlg-footer">
      <button class="btn btn-cancel">Cancel</button>
      <button class="btn btn-ok">OK</button>
    </div>
  </div>
</div>
</body>
</html>
